name: tick
on:
  schedule:
    - cron: "7 * * * *"   # hourly at :07 UTC
  workflow_dispatch: {}

concurrency:
  group: tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q "psycopg[binary]" requests
      - name: Run tick
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python -m jobs.tick
