function sparkline(curve, color){
  const vals = curve.map(p=>p.v);
  if (vals.length < 2){ return `<svg viewBox="0 0 110 30" width="110" height="30" aria-hidden="true"><circle cx="55" cy="15" r="3" fill="${color}"/></svg>`; }
  const w=110,h=30,min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
  const pts = vals.map((v,i)=>(i/(vals.length-1)*w).toFixed(1)+","+(h-3-(v-min)/span*(h-6)).toFixed(1)).join(" ");
  const ly = h-3-(vals[vals.length-1]-min)/span*(h-6);
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${w}" cy="${ly.toFixed(1)}" r="3" fill="${color}"/></svg>`;
}

function lineChart(container, dates, seriesList, opts={}){
  const pointCount = Math.max(...seriesList.map(s=>s.values.length));
  if (pointCount < 2){
    container.innerHTML = `<div class="emptychart">One data point so far (launched ${fmtDate(ARENA.run_date)}). The equity curve draws itself as the daily runs accumulate.</div>`;
    return;
  }
  const W=760,H=300,mL=46,mR=90,mT=14,mB=26,iw=W-mL-mR,ih=H-mT-mB;
  const all = seriesList.flatMap(s=>s.values);
  let lo=Math.min(...all), hi=Math.max(...all); const pad=(hi-lo)*0.08||1; lo-=pad; hi+=pad;
  const n = pointCount;
  const x = i => mL + (n>1 ? i/(n-1)*iw : iw/2);
  const y = v => mT + (1-(v-lo)/(hi-lo))*ih;
  const step = Math.max(1, Math.round((hi-lo)/4)); let grid="",ylabels="";
  for (let g=Math.ceil(lo/step)*step; g<=hi; g+=step){ const gy=y(g).toFixed(1);
    grid += `<line x1="${mL}" y1="${gy}" x2="${W-mR}" y2="${gy}" stroke="var(--grid)" stroke-width="1"/>`;
    ylabels += `<text x="${mL-8}" y="${gy}" dy="4" text-anchor="end" font-size="11" fill="var(--muted)" font-family="var(--mono)">${(g-100>=0?"+":"−")+Math.abs(g-100)+"%"}</text>`; }
  let xlabels="";
  dates.forEach((d,i)=>{ if (i===0 || i===dates.length-1){ xlabels += `<text x="${x(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--muted)">${fmtDate(d)}</text>`; } });
  let paths="",endDots="",endLabels=""; const labelYs=[];
  seriesList.forEach(s=>{
    const d = s.values.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ");
    if (s.fill) paths += `<path d="${d} L ${(W-mR).toFixed(1)} ${(mT+ih).toFixed(1)} L ${mL} ${(mT+ih).toFixed(1)} Z" fill="${s.color}" opacity="0.07"/>`;
    paths += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" ${s.dashed?'stroke-dasharray="5 4"':""}/>`;
    let ly=y(s.values[s.values.length-1]); while(labelYs.some(p=>Math.abs(p-ly)<14)) ly+=14; labelYs.push(ly);
    endDots += `<circle cx="${(W-mR).toFixed(1)}" cy="${y(s.values[s.values.length-1]).toFixed(1)}" r="3.5" fill="${s.color}"/>`;
    endLabels += `<g><rect x="${W-mR+8}" y="${(ly-5).toFixed(1)}" width="10" height="3" rx="1.5" fill="${s.color}"/><text x="${W-mR+22}" y="${ly.toFixed(1)}" dy="1" font-size="11.5" fill="var(--ink2)">${esc(s.name)}</text></g>`;
  });
  container.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(opts.aria||"equity chart")}">${grid}<line x1="${mL}" y1="${(mT+ih).toFixed(1)}" x2="${W-mR}" y2="${(mT+ih).toFixed(1)}" stroke="var(--axis)" stroke-width="1"/>${ylabels}${xlabels}${paths}${endDots}${endLabels}<line class="xhair" x1="0" y1="${mT}" x2="0" y2="${mT+ih}" stroke="var(--axis)" stroke-width="1" opacity="0"/></svg>`;
  const svg=container.querySelector("svg"), xhair=svg.querySelector(".xhair");
  svg.addEventListener("mousemove", ev=>{ const r=svg.getBoundingClientRect(); const px=(ev.clientX-r.left)/r.width*W;
    if (px<mL||px>W-mR){ xhair.setAttribute("opacity","0"); tooltip.style.display="none"; return; }
    const i=Math.max(0,Math.min(n-1,Math.round((px-mL)/iw*(n-1))));
    xhair.setAttribute("x1",x(i)); xhair.setAttribute("x2",x(i)); xhair.setAttribute("opacity","1");
    tooltip.style.display="block";
    tooltip.innerHTML = `<div class="tdate">${fmtDate(dates[i])}</div>` + seriesList.map(s=>`<div class="trow"><span class="l"><span class="dot" style="background:${s.color}"></span>${esc(s.name)}</span><span class="v">${s.values[i]!=null?pct(s.values[i]/100-1):"—"}</span></div>`).join("");
    const tw=tooltip.offsetWidth; let tx=ev.clientX+14; if (tx+tw>window.innerWidth-8) tx=ev.clientX-tw-14;
    tooltip.style.left=tx+"px"; tooltip.style.top=Math.max(8,ev.clientY-10)+"px"; });
  svg.addEventListener("mouseleave", ()=>{ xhair.setAttribute("opacity","0"); tooltip.style.display="none"; });
}

      <div class="tile"><div class="k">Max drawdown</div><div class="v">${pct(a.max_dd)}</div><div class="s">peak to trough</div></div>
      <div class="tile"><div class="k">Cash</div><div class="v">${pctPlain(a.cash_pct)}</div><div class="s">${money(a.cash)} idle</div></div>
      <div class="tile"><div class="k">Rulebook</div><div class="v">${a.n_principles}</div><div class="s">${a.n_revisions} revisions · ${a.n_hyp_testing} hyp testing</div></div>
    </div>
    <div class="card chartcard"><div class="charttitle">Equity vs benchmark</div>${legendHTML([{name:a.name,color:a.color},{name:a.benchmark_label,color:"var(--muted)"}])}<div class="chartbox" id="agentchart"></div></div>
    <div class="subtabs" role="tablist" aria-label="Agent detail">
      <button role="tab" data-subtab="journal" aria-selected="${state.subtab==="journal"}">Journal</button>
      <button role="tab" data-subtab="principles" aria-selected="${state.subtab==="principles"}">Principles</button>
      <button role="tab" data-subtab="hypotheses" aria-selected="${state.subtab==="hypotheses"}">Hypotheses</button>
      <button role="tab" data-subtab="positions" aria-selected="${state.subtab==="positions"}">Positions</button>
      <button role="tab" data-subtab="orders" aria-selected="${state.subtab==="orders"}">Orders</button>
    </div><div id="subview"></div>`;
  const dates=a.curve.map(p=>p.date);
  const series=[{name:a.name,color:a.color,values:a.curve.map(p=>p.v),fill:true}];
  if (a.bench_curve.length) series.push({name:a.benchmark_label,color:"var(--muted)",values:a.bench_curve.map(p=>p.v),dashed:true});
  lineChart($("#agentchart"), dates, series, {aria:a.name+" equity versus "+a.benchmark_label});
  $("#subview").innerHTML = state.subtab==="journal"?journalHTML(a):state.subtab==="principles"?principlesHTML(a):state.subtab==="hypotheses"?hypothesesHTML(a):state.subtab==="orders"?ordersHTML(a):positionsHTML(a);
  el.querySelectorAll(".chip").forEach(b=>b.addEventListener("click",()=>{ state.agent=b.dataset.agent; renderAgent(); }));
  el.querySelectorAll(".subtabs button").forEach(b=>b.addEventListener("click",()=>{ state.subtab=b.dataset.subtab; renderAgent(); }));
}
function ordersHTML(a){
  const so = a.standing_orders||[], fills = a.fills||[];
  const soRows = so.length ? `<div class="card tablewrap"><table class="pos"><thead><tr><th>#</th><th>Kind</th><th>Side</th><th>Symbol</th><th>Qty</th><th>Params</th><th>Note</th></tr></thead><tbody>${
    so.map(o=>`<tr><td>${o.id}</td><td class="tick" style="text-align:left">${esc(o.kind)}</td><td>${esc(o.side)}</td><td class="tick">${esc(o.symbol)}</td><td>${o.qty==null?"all":o.qty}</td><td style="text-align:left">${esc(JSON.stringify(o.params))}</td><td style="text-align:left;font-family:system-ui">${esc(o.note)}</td></tr>`).join("")
  }</tbody></table></div>` : `<p class="viewsub">No standing orders registered.</p>`;
  const fillRows = fills.length ? `<div class="card tablewrap" style="margin-top:12px"><table class="pos"><thead><tr><th>When</th><th>Side</th><th>Symbol</th><th>Qty</th><th>Fill</th></tr></thead><tbody>${
    fills.map(f=>`<tr><td style="text-align:left">${esc(f.ts)}</td><td><span class="${f.side==="buy"?"delta-up":"delta-dn"}">${f.side.toUpperCase()}</span></td><td class="tick">${esc(f.symbol)}</td><td>${(+f.qty).toLocaleString("en-US",{maximumFractionDigits:4})}</td><td>${(+f.fill_price).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</td></tr>`).join("")
  }</tbody></table></div>` : "";
  return `<p class="viewsub" style="margin:2px 0 12px">Standing orders are executed mechanically by the engine at every tick — hard rules enforced as code, not promises.</p>${soRows}${fillRows}`;
}
function renderSystem(){
  const el=$("#view-system"); const S=ARENA.system||{};
  const runs=(S.runs||[]).map(r=>`<tr><td style="text-align:left">${r.started}</td><td class="tick" style="text-align:left">${esc(r.agent)}</td><td style="text-align:left">${esc(r.trigger)}</td><td style="text-align:left">${esc(r.status)}</td><td>${r.cost!=null?"$"+r.cost.toFixed(3):"—"}</td><td>${r.tokens_in??"—"}</td><td>${r.tokens_out??"—"}</td></tr>`).join("");
  const ops=(S.ops||[]).map(o=>`<tr><td style="text-align:left">${o.ts}</td><td class="tick" style="text-align:left">${esc(o.agent)}</td><td style="text-align:left">${esc(o.type)}</td><td style="text-align:left"><span class="${o.verdict==="accepted"?"delta-up":"delta-dn"}">${o.verdict.toUpperCase()}</span></td><td style="text-align:left;font-family:system-ui;max-width:340px">${esc(o.reason||o.summary)}</td></tr>`).join("");
  const trig=(S.triggers||[]).map(t=>`<tr><td style="text-align:left">${t.ts}</td><td class="tick" style="text-align:left">${esc(t.agent)}</td><td style="text-align:left">${esc(t.kind)}</td><td style="text-align:left">${t.handled?"handled":"<b>pending</b>"}</td><td style="text-align:left;font-family:system-ui">${esc(t.details)}</td></tr>`).join("");
  el.innerHTML=`
    <h2 class="viewtitle">System</h2>
    <p class="viewsub">Is everything working? Data freshness, every brain run with its real cost, every operation with its verdict — rejections included, because rejections are the constitution doing its job.</p>
    <div class="tiles">
      <div class="tile"><div class="k">Last tick</div><div class="v" style="font-size:17px">${esc(S.last_tick||"—")}</div><div class="s">hourly, ${S.symbols_tracked||0} symbols</div></div>
      <div class="tile"><div class="k">Brain runs</div><div class="v">${(S.runs||[]).length}</div><div class="s">most recent shown below</div></div>
      <div class="tile"><div class="k">Total brain spend</div><div class="v">$${(S.total_cost_usd||0).toFixed(2)}</div><div class="s">all time, all agents</div></div>
      <div class="tile"><div class="k">Generated</div><div class="v" style="font-size:17px">${esc(ARENA.generated_at)}</div><div class="s">rebuilt every tick</div></div>
    </div>
    <div class="charttitle" style="margin:18px 2px 6px">Brain runs</div>
    <div class="card tablewrap"><table class="pos"><thead><tr><th>Started</th><th>Agent</th><th>Trigger</th><th>Status</th><th>Cost</th><th>Tok in</th><th>Tok out</th></tr></thead><tbody>${runs||""}</tbody></table></div>
    <div class="charttitle" style="margin:18px 2px 6px">Operations ledger</div>
    <div class="card tablewrap"><table class="pos"><thead><tr><th>When</th><th>Agent</th><th>Op</th><th>Verdict</th><th>Detail</th></tr></thead><tbody>${ops||""}</tbody></table></div>
    <div class="charttitle" style="margin:18px 2px 6px">Triggers</div>
    <div class="card tablewrap"><table class="pos"><thead><tr><th>When</th><th>Agent</th><th>Kind</th><th>State</th><th>Detail</th></tr></thead><tbody>${trig||`<tr><td colspan="5" style="text-align:left">none yet</td></tr>`}</tbody></table></div>`;
}
function renderCompare(){
  const el=$("#view-compare"); const sel=AGENTS.filter(a=>state.compare.has(a.id));
  const chips=AGENTS.map(a=>`<button class="chip" aria-pressed="${state.compare.has(a.id)}" data-agent="${a.id}"><span class="dot" style="background:${a.color}"></span>${a.name}</button>`).join("");
  const maxLen=Math.max(1,...sel.map(a=>a.curve.length));
  const dates=(sel.find(a=>a.curve.length===maxLen)||sel[0]||{curve:[]}).curve.map(p=>p.date);
  const stats = sel.length?`<div class="card tablewrap" style="margin-top:14px"><table class="arena"><thead><tr><th>Agent</th><th class="num">Return</th><th class="num">Alpha</th><th class="num">Max DD</th><th class="num">Revisions</th><th class="num">Hyp testing</th></tr></thead><tbody>${sel.map(a=>`<tr><td><div class="agentcell"><span class="dot" style="background:${a.color}"></span><span class="aname" style="font-size:15px">${a.name}</span></div></td><td class="num mono">${pct(a.ret)}</td><td class="num">${alphaCell(a.alpha)}</td><td class="num mono">${pct(a.max_dd)}</td><td class="num mono">${a.n_revisions}</td><td class="num mono">${a.n_hyp_testing}</td></tr>`).join("")}</tbody></table></div>`:"";
  const cols=sel.map(a=>`<div class="card cmpcol"><h4><span class="dot" style="background:${a.color}"></span>${a.name}</h4><span class="atype">${esc(a.archetype)}</span><ul>${a.principles.filter(p=>p.status!=="retired").map(p=>`<li>${esc(p.statement)}</li>`).join("")}</ul></div>`).join("");
  el.innerHTML=`
    <h2 class="viewtitle">Different philosophies, same market</h2>
    <p class="viewsub">Overlay any set of agents, indexed to 100 at launch. The divergence between the curves is the divergence between the rulebooks below them.</p>
    <div class="switcher">${chips}</div>
    ${sel.length?`<div class="card chartcard"><div class="charttitle">Equity, indexed</div>${legendHTML(sel.map(a=>({name:a.name,color:a.color})))}<div class="chartbox" id="cmpchart"></div></div>`:`<p class="viewsub" style="margin-top:16px">Select at least one agent.</p>`}
    ${stats}<div class="cmpgrid">${cols}</div>`;
  if (sel.length) lineChart($("#cmpchart"), dates, sel.map(a=>({name:a.name,color:a.color,values:a.curve.map(p=>p.v)})), {aria:"comparison of selected agents"});
  el.querySelectorAll(".chip").forEach(b=>b.addEventListener("click",()=>{ const id=b.dataset.agent; if(state.compare.has(id)) state.compare.delete(id); else state.compare.add(id); renderCompare(); }));
}
function setView(v){
  state.view=v;
  document.querySelectorAll("nav.tabs button").forEach(b=>b.setAttribute("aria-selected",String(b.dataset.view===v)));
  for (const id of ["arena","agent","compare","system"]) $("#view-"+id).hidden = id!==v;
  if (v==="arena") renderArena(); if (v==="agent") renderAgent(); if (v==="compare") renderCompare(); if (v==="system") renderSystem();
  window.scrollTo({top:0});
}
document.querySelectorAll("nav.tabs button").forEach(b=>b.addEventListener("click",()=>setView(b.dataset.view)));
renderArena();
</script>
</body>
</html>
